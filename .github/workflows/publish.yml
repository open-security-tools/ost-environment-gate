name: Publish SAM application

on:
  push:
    tags:
      - v*

permissions: {}

concurrency:
  group: publish-sam-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build SAM release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      artifact_id: ${{ steps.artifact.outputs.artifact-id }}
      release_version: ${{ steps.version.outputs.value }}
    env:
      CARGO_INCREMENTAL: 0
      CARGO_NET_RETRY: 10
      CARGO_TERM_COLOR: always
      LICENSE_FILE: LICENSE
      SAM_CLI_TELEMETRY: 0
    steps:
      - name: Validate semantic-version tag
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            printf 'Expected a semantic-version tag such as v1.2.3, got %q\n' "${RELEASE_TAG}" >&2
            exit 1
          fi
          printf 'value=%s\n' "${RELEASE_TAG#v}" >> "${GITHUB_OUTPUT}"

      - name: Check out release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          use-cache: false
          version: 0.15.1

      - name: Install Cargo Lambda
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          fallback: none
          tool: cargo-lambda@1.9.1

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          use-installer: true
          version: 1.163.0
          token: ${{ github.token }}

      - name: Validate SAM template
        run: sam validate --lint

      - name: Build release artifacts
        run: sam build --beta-features --no-use-container

      - name: Stage application documentation
        run: |
          cp README.md .aws-sam/build/README.md
          cp "${LICENSE_FILE}" ".aws-sam/build/${LICENSE_FILE}"

      - name: Archive built SAM application
        run: tar -cf sam-build.tar -C .aws-sam/build .

      - name: Upload built SAM application
        id: artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sam-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: sam-build.tar
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    name: Publish to AWS Serverless Application Repository
    needs: build
    runs-on: ubuntu-latest
    environment: sam-publishing
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      APPLICATION_NAME: ost-environment-gate
      ARTIFACT_BUCKET: ${{ vars.ARTIFACT_BUCKET }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      SAM_CLI_TELEMETRY: 0
    steps:
      - name: Download built SAM application
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}

      - name: Restore built SAM application
        run: |
          mkdir -p .aws-sam/build
          tar -xf sam-build.tar -C .aws-sam/build

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          use-installer: true
          version: 1.163.0
          token: ${{ github.token }}

      - name: Configure AWS credentials with GitHub OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          allowed-account-ids: ${{ env.AWS_ACCOUNT_ID }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: ost-sam-publish-${{ github.run_id }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Package application
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          sam package \
            --template-file .aws-sam/build/template.yaml \
            --output-template-file packaged.json \
            --use-json \
            --s3-bucket "${ARTIFACT_BUCKET}" \
            --s3-prefix "${APPLICATION_NAME}/${RELEASE_TAG}" \
            --region "${AWS_REGION}" \
            --no-progressbar

      - name: Prepare application metadata and template
        run: |
          APPLICATION_ID="arn:aws:serverlessrepo:${AWS_REGION}:${AWS_ACCOUNT_ID}:applications/${APPLICATION_NAME}"

          jq --arg application_id "${APPLICATION_ID}" '
            .Metadata["AWS::ServerlessRepo::Application"]
            | {
                ApplicationId: $application_id,
                Author,
                Description,
                HomePageUrl,
                Labels,
                ReadmeUrl
              }
            | with_entries(select(.value != null))
          ' packaged.json > application-metadata.json

          jq '
            del(.Metadata["AWS::ServerlessRepo::Application"])
            | if .Metadata == {} then del(.Metadata) else . end
          ' packaged.json > application-template.json

      - name: Update application metadata
        run: |
          aws serverlessrepo update-application \
            --cli-input-json file://application-metadata.json \
            --region "${AWS_REGION}" \
            --no-cli-pager

      - name: Publish application version
        env:
          RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
        run: |
          aws serverlessrepo create-application-version \
            --application-id "arn:aws:serverlessrepo:${AWS_REGION}:${AWS_ACCOUNT_ID}:applications/${APPLICATION_NAME}" \
            --semantic-version "${RELEASE_VERSION}" \
            --source-code-url "https://github.com/${GITHUB_REPOSITORY}/tree/${GITHUB_SHA}" \
            --template-body file://application-template.json \
            --region "${AWS_REGION}" \
            --no-cli-pager
