AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ost-environment-gate - validates GitHub deployment protection webhooks,
  queues them, and serializes environment reviews.

Metadata:
  AWS::ServerlessRepo::Application:
    Name: ost-environment-gate
    Description: Evaluate GitHub Actions deployment protection rules with a trusted policy.
    Author: open-security-tools
    LicenseUrl: LICENSE
    ReadmeUrl: README.md
    Labels:
      - github-actions
      - deployment-protection
      - security
    HomePageUrl: https://github.com/open-security-tools/ost-environment-gate
    SourceCodeUrl: https://github.com/open-security-tools/ost-environment-gate

Globals:
  Function:
    Runtime: provided.al2023
    Architectures:
      - arm64
    MemorySize: 256

Parameters:
  PolicyJson:
    Type: String
    Description: JSON policy document for deployment protection evaluation
  AppIdParameterName:
    Type: String
    Default: /ost/app-id
  AppPrivateKeySecretName:
    Type: String
    Description: Secrets Manager secret name containing the GitHub App PEM private key
  WebhookSecretParameterName:
    Type: String
    Default: /ost/webhook-secret
  AlarmTopicArn:
    Type: String
    Description: SNS topic ARN for environment-gate alarm notifications

Resources:
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","requestTime":"$context.requestTime","routeKey":"$context.routeKey","status":"$context.status","responseLength":"$context.responseLength","responseLatency":"$context.responseLatency","integrationLatency":"$context.integrationLatency"}

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/vendedlogs/${AWS::StackName}/http-api
      RetentionInDays: 30

  WebhookLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-webhook
      RetentionInDays: 30

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-worker
      RetentionInDays: 30

  DeploymentReviewQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-reviews.fifo
      FifoQueue: true
      ContentBasedDeduplication: false
      DelaySeconds: 2
      VisibilityTimeout: 720
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  WebhookFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
      BuildProperties:
        Binary: ost-environment-gate
    Properties:
      CodeUri: .
      Handler: bootstrap
      FunctionName: !Sub ${AWS::StackName}-webhook
      Timeout: 8
      ReservedConcurrentExecutions: 100
      LoggingConfig:
        LogGroup: !Ref WebhookLogGroup
      Environment:
        Variables:
          WEBHOOK_SECRET_PARAMETER: !Ref WebhookSecretParameterName
          DEPLOYMENT_REVIEW_QUEUE_URL: !Ref DeploymentReviewQueue
          RUST_LOG: info
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /health
            Method: GET
        GitHubWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /github/webhook
            Method: POST
      Policies:
        - Statement:
            - Effect: Allow
              Action: sqs:SendMessage
              Resource: !GetAtt DeploymentReviewQueue.Arn
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${WebhookSecretParameterName}

  WorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
      BuildProperties:
        Binary: ost-environment-gate
    Properties:
      CodeUri: .
      Handler: bootstrap
      FunctionName: !Sub ${AWS::StackName}-worker
      Timeout: 120
      ReservedConcurrentExecutions: 2
      LoggingConfig:
        LogGroup: !Ref WorkerLogGroup
      Environment:
        Variables:
          HANDLER_MODE: worker
          POLICY_JSON: !Ref PolicyJson
          APP_ID_PARAMETER: !Ref AppIdParameterName
          APP_PRIVATE_KEY_SECRET_NAME: !Ref AppPrivateKeySecretName
          RUST_LOG: info
      Events:
        DeploymentReviews:
          Type: SQS
          Properties:
            Queue: !GetAtt DeploymentReviewQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures
            ScalingConfig:
              MaximumConcurrency: 2
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt DeploymentReviewQueue.QueueName
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AppIdParameterName}
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppPrivateKeySecretName}*

  WebhookErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Lambda errors while receiving environment-gate webhooks
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref WebhookFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopicArn

  WorkerErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Lambda errors while processing environment reviews
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref WorkerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopicArn

  WorkerThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Lambda throttles while processing environment reviews
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref WorkerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopicArn

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: HTTP API errors while receiving environment-gate webhooks
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref Api
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopicArn

  DeploymentReviewQueueAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Environment reviews waiting too long to be processed
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
        - Name: QueueName
          Value: !GetAtt DeploymentReviewQueue.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 300
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopicArn

  DeploymentReviewFailureMetric:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref WorkerLogGroup
      FilterPattern: '{ $.fields.outcome = "retry" }'
      MetricTransformations:
        - MetricNamespace: !Sub ${AWS::StackName}/reviews
          MetricName: FailedReviewBatches
          MetricValue: '1'
          DefaultValue: 0
          Unit: Count

  DeploymentReviewFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Environment-review batches returned for retry
      Namespace: !Sub ${AWS::StackName}/reviews
      MetricName: FailedReviewBatches
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopicArn

Outputs:
  ApiUrl:
    Description: Base API URL
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com
  WebhookUrl:
    Description: Full GitHub webhook URL
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/github/webhook
  DeploymentReviewQueueUrl:
    Description: FIFO queue used for authenticated deployment-protection requests
    Value: !Ref DeploymentReviewQueue
