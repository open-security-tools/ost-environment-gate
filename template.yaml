AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ost-environment-gate - validates GitHub deployment protection webhooks,
  queues them, and serializes environment reviews.

Globals:
  Function:
    Runtime: provided.al2023
    Architectures:
      - arm64
    MemorySize: 256

Parameters:
  PolicyJson:
    Type: String
    Description: JSON policy document for deployment protection evaluation
  AppIdParameterName:
    Type: String
    Default: /ost/app-id
  AppPrivateKeySecretName:
    Type: String
    Description: Secrets Manager secret name containing the GitHub App PEM private key
  WebhookSecretParameterName:
    Type: String
    Default: /ost/webhook-secret

Resources:
  Api:
    Type: AWS::Serverless::HttpApi

  DeploymentReviewDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-reviews-dlq.fifo
      FifoQueue: true
      ContentBasedDeduplication: false
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      RedriveAllowPolicy:
        redrivePermission: byQueue
        sourceQueueArns:
          - !Sub arn:${AWS::Partition}:sqs:${AWS::Region}:${AWS::AccountId}:${AWS::StackName}-reviews.fifo

  DeploymentReviewQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-reviews.fifo
      FifoQueue: true
      ContentBasedDeduplication: false
      DelaySeconds: 2
      VisibilityTimeout: 720
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeploymentReviewDeadLetterQueue.Arn
        maxReceiveCount: 5

  DeploymentReviewQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref DeploymentReviewQueue
        - !Ref DeploymentReviewDeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyUnauthenticatedWebhookProducers
            Effect: Deny
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt DeploymentReviewQueue.Arn
            Condition:
              ArnNotEquals:
                aws:PrincipalArn:
                  - !GetAtt WebhookFunctionRole.Arn
                  - !GetAtt DeploymentReviewRedriveRole.Arn
          - Sid: DenyDirectRedriveRoleSends
            Effect: Deny
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt DeploymentReviewQueue.Arn
            Condition:
              ArnEquals:
                aws:PrincipalArn: !GetAtt DeploymentReviewRedriveRole.Arn
              StringNotEquals:
                aws:CalledViaLast: sqs.amazonaws.com
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: sqs:*
            Resource:
              - !GetAtt DeploymentReviewQueue.Arn
              - !GetAtt DeploymentReviewDeadLetterQueue.Arn
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  DeploymentReviewRedriveRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: sts:AssumeRole
      Policies:
        - PolicyName: deployment-review-redrive
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:StartMessageMoveTask
                  - sqs:CancelMessageMoveTask
                  - sqs:ListMessageMoveTasks
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ListDeadLetterSourceQueues
                Resource: !GetAtt DeploymentReviewDeadLetterQueue.Arn
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt DeploymentReviewQueue.Arn
                Condition:
                  StringEquals:
                    aws:CalledViaLast: sqs.amazonaws.com

  WebhookFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
      BuildProperties:
        Binary: ost-environment-gate
    Properties:
      CodeUri: .
      Handler: bootstrap
      FunctionName: !Sub ${AWS::StackName}-webhook
      Timeout: 8
      ReservedConcurrentExecutions: 100
      Environment:
        Variables:
          WEBHOOK_SECRET_PARAMETER: !Ref WebhookSecretParameterName
          DEPLOYMENT_REVIEW_QUEUE_URL: !Ref DeploymentReviewQueue
          RUST_LOG: info
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /health
            Method: GET
        GitHubWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /github/webhook
            Method: POST
      Policies:
        - Statement:
            - Effect: Allow
              Action: sqs:SendMessage
              Resource: !GetAtt DeploymentReviewQueue.Arn
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${WebhookSecretParameterName}

  WorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
      BuildProperties:
        Binary: ost-environment-gate
    Properties:
      CodeUri: .
      Handler: bootstrap
      FunctionName: !Sub ${AWS::StackName}-worker
      Timeout: 120
      ReservedConcurrentExecutions: 2
      Environment:
        Variables:
          HANDLER_MODE: worker
          POLICY_JSON: !Ref PolicyJson
          APP_ID_PARAMETER: !Ref AppIdParameterName
          APP_PRIVATE_KEY_SECRET_NAME: !Ref AppPrivateKeySecretName
          RUST_LOG: info
      Events:
        DeploymentReviews:
          Type: SQS
          Properties:
            Queue: !GetAtt DeploymentReviewQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures
            ScalingConfig:
              MaximumConcurrency: 2
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt DeploymentReviewQueue.QueueName
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AppIdParameterName}
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppPrivateKeySecretName}*

Outputs:
  ApiUrl:
    Description: Base API URL
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com
  WebhookUrl:
    Description: Full GitHub webhook URL
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/github/webhook
  DeploymentReviewQueueUrl:
    Description: FIFO queue used for authenticated deployment-protection requests
    Value: !Ref DeploymentReviewQueue
  DeploymentReviewDeadLetterQueueUrl:
    Description: FIFO queue containing deployment reviews that exhausted retries
    Value: !Ref DeploymentReviewDeadLetterQueue
  DeploymentReviewRedriveRoleArn:
    Description: Role operators can assume to redrive failed deployment reviews
    Value: !GetAtt DeploymentReviewRedriveRole.Arn
